project:
  type: book
  output-dir: docs
  post-render:
    - ./render_notebooks.sh
  resources:
    - notebooks/*.ipynb

book:
  chapters:
    - index.qmd
    - 02_simple_data_types.qmd
    - 03_loops_and_conditions.qmd
    - 04_container_data_types.qmd
    - 05_libraries.qmd
    - 06_handling_data.qmd
    - 07_numpy_from_chatgpt.qmd
    - 10_misc.qmd
number-sections: true

execute:
  enable: true

format:
  pdf: 
    toc: true
    toc-depth: 2
  html:
    notebook-links: true
    toc: true
    toc-depth: 2
